<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Solo DMV Services</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* TOP BAR */

        .top-bar {

            width: 100%;

            padding: 20px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .licensed {

            color: #ffcc00;

            font-weight: bold;

            font-size: 0.9rem;
        }

        .language-buttons {

            display: flex;
            gap: 10px;
        }

        .language-buttons button {

            background: transparent;

            border: 2px solid #ffcc00;

            color: #ffcc00;

            padding: 10px 18px;

            border-radius: 12px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        .language-buttons button:hover {

            background: #ffcc00;
            color: black;
        }

        /* HERO */

        .hero {

            width: 100%;

            display: flex;
            flex-direction: column;

            justify-content: center;
            align-items: center;

            text-align: center;

           padding: 10px 20px 40px;
        }

        /* LOGO */

        .logo img {

            .logo img {

    width: 220px;
    max-width: 75%;

    margin-bottom: 20px;
}
        

        /* TITLE */

        .hero h1 {

            color: #ffcc00;

            font-size: 5rem;
            font-weight: 900;

            line-height: 0.95;

            margin-bottom: 30px;

            text-shadow:
                0 0 10px rgba(255, 204, 0, 0.2),
                0 0 30px rgba(255, 204, 0, 0.15);
        }

        /* SUBTITLE */

        .hero h2 {

            font-size: 3rem;
            font-weight: bold;

            line-height: 1.1;

            margin-bottom: 10px;
        }

        /* GOLD NEON */

        .gold-neon {

            margin-top: 20px;
            margin-bottom: 35px;

            color: #ffcc00;

            font-size: 2.2rem;
            font-weight: 300;

            letter-spacing: 8px;

            text-shadow:
                0 0 5px #ffcc00,
                0 0 10px #ffcc00,
                0 0 20px rgba(255, 204, 0, 0.8),
                0 0 40px rgba(255, 204, 0, 0.5);

            animation: flicker 4s infinite;
        }

        /* DESCRIPTION */

        .description {

            max-width: 900px;

            font-size: 1.4rem;

            line-height: 1.8;

            opacity: 0.9;

            margin-bottom: 50px;
        }

        /* BUTTONS */

        .buttons {

            display: flex;
            gap: 25px;

            flex-wrap: wrap;

            justify-content: center;
        }

        .buttons a {

            border: 3px solid #ffcc00;

            color: #ffcc00;

            text-decoration: none;

            padding: 20px 40px;

            border-radius: 18px;

            font-size: 1.4rem;
            font-weight: bold;

            transition: 0.3s;
        }

        .buttons a:hover {

            background: #ffcc00;
            color: black;
        }

        /* FLICKER */

        @keyframes flicker {

            0%,
            18%,
            22%,
            25%,
            53%,
            57%,
            100% {
                opacity: 1;
            }

            20%,
            24%,
            55% {
                opacity: 0.6;
            }
        }

        /* MOBILE */

        @media (max-width: 768px) {
.logo img{
    width:180px;
}

.hero h1{
    font-size:3.2rem;
}

.hero h2{
    font-size:2.1rem;
    line-height:1.1;
}

.description{
    font-size:1rem;
}

.buttons{
    margin-top:10px;
}
            .top-bar {

                flex-direction: column;
                gap: 20px;
            }

            .hero h1 {

                font-size: 4rem;
            }

            .hero h2 {

                font-size: 2.5rem;
            }

            .gold-neon {

                font-size: 1.5rem;

                letter-spacing: 5px;

                margin-top: 15px;
                margin-bottom: 30px;
            }

            .description {

                font-size: 1rem;

                line-height: 1.7;

                padding: 0 10px;
            }

            .buttons {

                width: 100%;

                flex-direction: row;
            }

            .buttons a {

                flex: 1;

                text-align: center;

                font-size: 1.1rem;

                padding: 18px 20px;
            }

        }

    </style>

</head>

<body>

    <div class="top-bar">

        <div class="licensed" id="licensedText">
            LICENSED & BONDED
        </div>

        <div class="language-buttons">

            <button onclick="setEnglish()">
                ENGLISH
            </button>

            <button onclick="setSpanish()">
                ESPAÑOL
            </button>

        </div>

    </div>

    <section class="hero">

        <div class="logo">

            <img src="logo.png" alt="Solo DMV">

        </div>

        <h1 id="mainTitle">
            SOLO DMV<br>
            SERVICES
        </h1>

        <h2 id="subtitle">
            Las Vegas Mobile DMV<br>
            Services
        </h2>

        <div class="gold-neon" id="neonText">
            WE COME TO YOU
        </div>

        <div class="description" id="descriptionText">

            Mobile DMV services in Las Vegas for title transfers,
            vehicle registration, moving permits, and bilingual DMV assistance.

            <br><br>

            Fast DMV help without long DMV lines.

        </div>

        <div class="buttons">

            <a href="tel:+17252331518" id="callButton">
                CALL NOW
            </a>

            <a href="https://wa.me/17252331518" id="whatsappButton">
                WHATSAPP
            </a>

        </div>

    </section>

    <script>

        function setSpanish() {

            document.getElementById("licensedText").innerHTML =
                "LICENCIADO Y ASEGURADO";

            document.getElementById("subtitle").innerHTML =
                "Servicios Móviles DMV<br>Las Vegas";

            document.getElementById("neonText").innerHTML =
                "VAMOS HASTA USTED";

            document.getElementById("descriptionText").innerHTML =
                "Servicios móviles de DMV en Las Vegas para traspasos de títulos, registros de vehículos, permisos de movimiento y asistencia bilingüe DMV.<br><br>Ayuda rápida sin largas filas del DMV.";

            document.getElementById("callButton").innerHTML =
                "LLÁMANOS";

            document.getElementById("whatsappButton").innerHTML =
                "WHATSAPP";
        }

        function setEnglish() {

            document.getElementById("licensedText").innerHTML =
                "LICENSED & BONDED";

            document.getElementById("subtitle").innerHTML =
                "Las Vegas Mobile DMV<br>Services";

            document.getElementById("neonText").innerHTML =
                "WE COME TO YOU";

            document.getElementById("descriptionText").innerHTML =
                "Mobile DMV services in Las Vegas for title transfers, vehicle registration, moving permits, and bilingual DMV assistance.<br><br>Fast DMV help without long DMV lines.";

            document.getElementById("callButton").innerHTML =
                "CALL NOW";

            document.getElementById("whatsappButton").innerHTML =
                "WHATSAPP";
        }

    </script>

</body>

</html>
